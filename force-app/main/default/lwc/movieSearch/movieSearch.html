<template>
    <!--Filter Section-->
    <div class="filterstyle">
        
        <lightning-layout horizontal-align="center">
            <lightning-layout-item padding="around-small" label="Choose Type" size="3">
                <lightning-combobox name="type" 
                                    label="Type" 
                                    value={selectedType} 
                                    placeholder="Select Type"
                                    options={avlOptions} 
                                    onchange={handleChange} >
                </lightning-combobox>
            </lightning-layout-item>
            <lightning-layout-item padding="around-small" label="Search" size="6">
                <lightning-input name="search" 
                                label="Enter Search" 
                                type="search" 
                                placeholder="Search for movie/series"
                                is-loading={loading} 
                                onchange={handleChange} >
                </lightning-input>
            </lightning-layout-item>
            <lightning-layout-item padding="around-small" label="Page Number" size="3">
                <lightning-input type="number" 
                                name="page" 
                                label="Enter a page number" 
                                value={pageNo} 
                                max="100" min = "1" 
                                onchange={handleChange}
                                field-level-help="Range: 1-100"
                                step="1"
                                message-when-range-underflow="Min value should be 1"
                                message-when-range-overflow="Max value should be 1">
                </lightning-input>
            </lightning-layout-item>
        </lightning-layout>
    </div>
     <!--Display Section-->
     <template if:true={displayStatus}>
     <div class=" slds-var-m-top_large slds-scrollable slds-box displayStyle">
     <lightning-layout horizontal-align="center" multiple-rows="true">
        <template for:each={searchResult} for:item="searchItem">
            <lightning-layout-item size="3" padding="around-small" key={searchItem.imdbID}>
                <c-movie-tile movie={searchItem}
                            selected-movie-id={selectedMovie}
                            onselectedmovie={movieSelectedHandler}>
                </c-movie-tile>
                
            </lightning-layout-item>  
        </template>
     </lightning-layout>
    </div>  
    </template>
</template>
