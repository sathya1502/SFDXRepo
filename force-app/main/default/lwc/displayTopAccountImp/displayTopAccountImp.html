<template>
    <lightning-card>
        <lightning-input label="No. of Accounts to Fetch" type="number" onkeyup={handleKeyUp}></lightning-input>
        <template for:each={accountList} for:item="acc">
            <div key={acc.Id}>
                <lightning-card>
                    <p> Account Name: {acc.Name}</p>
                    <p> Account Revenue: {acc.AnnualRevenue}</p>
                </lightning-card>                
            </div>
        </template>
    </lightning-card>
</template>
